# https://taskfile.dev

version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: "default task"
    cmds:
      - task -a

  vet:
    desc: "go vet"
    cmds:
      - go vet ./...

  test:
    desc: "go test"
    cmds:
      - go test -short -race -v ./... -cover

  lint:
    desc: "golangci-lint"
    cmds:
      - golangci-lint run --verbose ./...

  pr:current:
    desc: "get PR of current branch"
    cmds:
      - bash scripts/get-current-pr.sh

  pr:ensure-draft:
    desc: "get current branch PR or create draft if missing"
    cmds:
      - bash scripts/get-current-pr.sh --ensure-draft --base main
